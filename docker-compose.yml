services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: products-information-manage
    restart: unless-stopped
    env_file:
      - ./deploy/app.env
    environment:
      - PORT=${PORT:-8080}
    ports:
      - "${APP_PORT:-8085}:${PORT:-8080}"
    volumes:
      - ./data:/app/data
